name: Deploy to Render

# Este workflow se dispara después de que build-test.yml termine correctamente
on:
  workflow_run:
    workflows: ["Build & Test (.NET 8)"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pegá en GitHub la URL COMPLETA del Deploy Hook (incluye ?key=...).
      # Render → Web Service → Settings → Deploy Hook → copiar URL.
      - name: Trigger Render Deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

